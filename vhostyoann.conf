<VirtualHost *:80>
        ServerName www.adrar.lan
        # On pointe vers le dossier yoyo
        DocumentRoot /var/www/html/yoyo
        <Directory /var/www/html/yoyo>
            # On autorise index.html et accueil.html
            DirectoryIndex index.html index.php accueil.html
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>
</VirtualHost>

<VirtualHost *:443>
        ServerName www.adrar.lan
        DocumentRoot /var/www/html/yoyo
        SSLEngine On
        SSLCertificateFile /etc/apache2/certificate/apache-certificate.crt
        SSLCertificateKeyFile /etc/apache2/certificate/apache.key
        <Directory /var/www/html/yoyo>
            DirectoryIndex index.html index.php accueil.html
            Options Indexes FollowSymLinks
            AllowOverride All
            Require all granted
        </Directory>
</VirtualHost>